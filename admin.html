<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Nelson's Stor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="images/logo.jpg" />
  <link rel="apple-touch-icon" href="images/logo.jpg" />
  <link rel="stylesheet" href="css/styles.css?v=6" />
  <link rel="stylesheet" href="css/admin.css?v=2" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><img class="site-logo__img" src="images/logo.jpg" alt="Nelson's Stor logo" width="42" height="42" /> Nelson's Stor</a>
    <nav class="header-nav">
      <a href="index.html">View shop</a>
      <button id="logout-btn" class="btn-ghost" type="button" hidden>Sign out</button>
    </nav>
  </div>
</header>

<main class="admin-main">

  <!-- LOGIN -->
  <section id="login-view" hidden>
    <div class="login-card">
      <h2>Admin sign in</h2>
      <p class="login-card__hint">Manage the Nelson's Stor catalogue.</p>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
        </div>
        <button id="login-submit" class="btn-primary" type="submit">Sign in</button>
        <p id="login-error" class="form-error" role="alert" hidden></p>
      </form>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard-view" hidden>
    <div class="admin-head">
      <div>
        <h1>Cards</h1>
        <p>Edit any card's details, price and stock. Changes go live instantly.</p>
      </div>
      <button id="postage-btn" class="btn-ghost" type="button">Postage settings</button>
    </div>

    <div class="admin-toolbar">
      <input id="admin-search" type="search" placeholder="Search by title or id…" aria-label="Search cards" />
      <select id="admin-cat" aria-label="Filter by category"></select>
      <span id="card-count" class="card-count"></span>
    </div>

    <p id="list-status" class="list-status" hidden></p>
    <div id="card-list" class="card-list"></div>
  </section>

</main>

<!-- CARD EDITOR MODAL -->
<div id="card-editor" class="modal" hidden>
  <div class="modal__backdrop" data-close-modal="card-editor"></div>
  <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="ce-heading">
    <div class="modal__head">
      <h2 id="ce-heading">Edit card</h2>
      <button class="modal__close" type="button" data-close-modal="card-editor" aria-label="Close">×</button>
    </div>
    <form id="card-editor-form" novalidate>
      <p class="ce-id-line">ID: <code id="ce-id"></code></p>
      <div class="field">
        <label for="ce-title">Title</label>
        <input id="ce-title" type="text" required />
      </div>
      <div class="field">
        <label for="ce-description">Description</label>
        <textarea id="ce-description" rows="3" required></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="ce-price">Price (£)</label>
          <input id="ce-price" type="number" step="0.01" min="0" required />
        </div>
        <div class="field">
          <label for="ce-size">Size</label>
          <select id="ce-size"></select>
        </div>
        <div class="field">
          <label for="ce-gsm">GSM</label>
          <input id="ce-gsm" type="number" min="0" step="1" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="ce-category">Category</label>
          <select id="ce-category"></select>
        </div>
        <div class="field">
          <label for="ce-stock">Stock <span class="field-hint">(blank = unlimited)</span></label>
          <input id="ce-stock" type="number" min="0" step="1" placeholder="Unlimited" />
        </div>
        <div class="field">
          <label for="ce-sort">Sort order</label>
          <input id="ce-sort" type="number" min="0" step="1" required />
        </div>
      </div>
      <div class="toggle-row">
        <label class="toggle"><input id="ce-active" type="checkbox" /> <span>Live on shop</span></label>
        <label class="toggle"><input id="ce-bundle" type="checkbox" /> <span>Bundle</span></label>
      </div>
      <p id="ce-error" class="form-error" role="alert" hidden></p>
      <div class="modal__actions">
        <button class="btn-ghost" type="button" data-close-modal="card-editor">Cancel</button>
        <button id="ce-save" class="btn-primary btn-primary--inline" type="submit">Save changes</button>
      </div>
    </form>
  </div>
</div>

<!-- POSTAGE EDITOR MODAL -->
<div id="postage-editor" class="modal" hidden>
  <div class="modal__backdrop" data-close-modal="postage-editor"></div>
  <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="pe-heading">
    <div class="modal__head">
      <h2 id="pe-heading">Postage settings</h2>
      <button class="modal__close" type="button" data-close-modal="postage-editor" aria-label="Close">×</button>
    </div>
    <p id="pe-loading" class="list-status">Loading…</p>
    <form id="postage-editor-form" novalidate>
      <div id="pe-body" hidden>
        <div class="field-row">
          <div class="field">
            <label for="pe-uk">UK standard (pence)</label>
            <input id="pe-uk" type="number" min="0" step="1" required />
          </div>
          <div class="field">
            <label for="pe-free">Free over (cards)</label>
            <input id="pe-free" type="number" min="0" step="1" required />
          </div>
          <div class="field">
            <label for="pe-intl">International (pence)</label>
            <input id="pe-intl" type="number" min="0" step="1" required />
          </div>
        </div>
        <p id="pe-preview" class="pe-preview"></p>
      </div>
      <p id="pe-error" class="form-error" role="alert" hidden></p>
      <div class="modal__actions">
        <button class="btn-ghost" type="button" data-close-modal="postage-editor">Cancel</button>
        <button id="pe-save" class="btn-primary btn-primary--inline" type="submit">Save postage</button>
      </div>
    </form>
  </div>
</div>

<script src="js/admin-auth.js?v=1"></script>
<script src="js/admin-data.js?v=1"></script>
<script src="js/admin.js?v=2"></script>
<script src="js/admin-editor.js?v=2"></script>
</body>
</html>
