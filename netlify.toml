[build]
  publish = "."
  functions = "netlify/functions"

# Supabase URL + publishable/anon key are public by design (RLS-bound) and live in
# js/store.js. Exclude them from secret scanning; SUPABASE_SERVICE_ROLE_KEY is NOT
# omitted, so the real secret stays protected if it ever leaks into the build.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"
  SECRETS_SCAN_OMIT_PATHS = "js/store.js,js/admin-auth.js"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://hysikygygqzbmgkajpwo.supabase.co; media-src 'self' https://hysikygygqzbmgkajpwo.supabase.co; connect-src 'self' https://hysikygygqzbmgkajpwo.supabase.co; frame-src https://checkout.stripe.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com; upgrade-insecure-requests"

# HTML is not fingerprinted — always revalidate so markup updates can't go stale
# against freshly-revalidated CSS/JS (admin.html especially).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS/JS are not fingerprinted — always revalidate so updates show immediately
[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images/video are stable per filename — cache long
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Catalogue + media manifest — revalidate so edits show on redeploy
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
